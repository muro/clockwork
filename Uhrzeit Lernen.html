<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Uhrzeit Lernen</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:ital,wght@0,400;0,600;0,700;1,400;1,600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  html,body{margin:0;padding:0;background:#f0eee9;min-height:100vh;}
  body{display:flex;align-items:flex-start;justify-content:center;padding:20px;box-sizing:border-box;}
  @keyframes clockPop {
    0% { transform: scale(0) rotate(-20deg); }
    60% { transform: scale(1.1) rotate(10deg); }
    100% { transform: scale(1) rotate(0deg); }
  }
  button { font-family: inherit; }
  .phone {
    width: 380px; height: 780px;
    border-radius: 44px;
    background: #1d1b20;
    padding: 10px;
    box-shadow: 0 30px 60px rgba(0,0,0,0.25), 0 0 0 1px rgba(0,0,0,0.15);
    position: relative;
  }
  .phone .screen {
    width: 100%; height: 100%;
    border-radius: 34px;
    overflow: hidden;
    position: relative;
    background: #fff;
  }
  .phone .statusbar {
    position: absolute; top: 0; left: 0; right: 0; height: 28px;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 18px; font-family: 'Roboto', system-ui, sans-serif;
    font-size: 12px; font-weight: 500; color: #1a1a1a;
    z-index: 5; pointer-events: none;
  }
  .phone .punch {
    position: absolute; top: 8px; left: 50%; transform: translateX(-50%);
    width: 16px; height: 16px; border-radius: 50%; background: #0a0a0a;
    z-index: 6;
  }
  .phone .gesture {
    position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%);
    width: 100px; height: 4px; border-radius: 2px; background: rgba(0,0,0,0.35);
    z-index: 6;
  }
  .phone .scroll {
    position: absolute; inset: 28px 0 20px 0;
    overflow: auto;
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="engine.jsx"></script>
<script type="text/babel" src="Clock.jsx"></script>
<script type="text/babel" src="variants.jsx"></script>

<script type="text/babel">
function Phone({ children }) {
  return (
    <div data-screen-label="Uhrzeit">
      <div className="phone">
        <div className="screen">
          <div className="statusbar">
            <span>9:30</span>
            <span>●●●  ▮▮▮</span>
          </div>
          <div className="punch" />
          <div className="scroll">{children}</div>
          <div className="gesture" />
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<Phone><UhrzeitApp /></Phone>);
</script>
</body>
</html>
