<!doctype html>
<!--
  preview.html — development preview wrapper.
  Renders index.html inside a Claude-Design phone-frame mockup (iframe).
  The app itself lives in index.html and does NOT include this frame.
-->
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Uhrzeit — Preview</title>
<style>
  html, body { margin: 0; padding: 0; background: #f0eee9; min-height: 100vh; }
  body {
    display: flex; align-items: flex-start; justify-content: center;
    padding: 20px; box-sizing: border-box;
    font-family: system-ui, sans-serif;
  }
  .phone {
    width: 380px; height: 780px;
    border-radius: 44px;
    background: #1d1b20;
    padding: 10px;
    box-shadow: 0 30px 60px rgba(0,0,0,0.25), 0 0 0 1px rgba(0,0,0,0.15);
    position: relative;
    flex-shrink: 0;
  }
  .phone .screen {
    width: 100%; height: 100%;
    border-radius: 34px;
    overflow: hidden;
    position: relative;
    background: #fff;
  }
  .phone .statusbar {
    position: absolute; top: 0; left: 0; right: 0; height: 28px;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 18px;
    font-family: Roboto, system-ui, sans-serif;
    font-size: 12px; font-weight: 500; color: #1a1a1a;
    z-index: 5; pointer-events: none;
  }
  .phone .punch {
    position: absolute; top: 8px; left: 50%; transform: translateX(-50%);
    width: 16px; height: 16px; border-radius: 50%; background: #0a0a0a;
    z-index: 6;
  }
  .phone .gesture {
    position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%);
    width: 100px; height: 4px; border-radius: 2px; background: rgba(0,0,0,0.35);
    z-index: 6;
  }
  .phone iframe {
    position: absolute;
    inset: 28px 0 20px 0;
    width: 100%;
    height: calc(100% - 48px);
    border: 0;
    display: block;
  }
</style>
</head>
<body>
<div class="phone">
  <div class="screen">
    <div class="statusbar">
      <span>9:30</span>
      <span>●●●  ▮▮▮</span>
    </div>
    <div class="punch"></div>
    <iframe src="index.html" title="Uhrzeit Lernen"></iframe>
    <div class="gesture"></div>
  </div>
</div>
</body>
</html>
