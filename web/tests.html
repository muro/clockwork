<!doctype html>
<!--
  tests.html — in-browser unit tests.
  Loads engine.js and runs assertions against pure logic + localStorage.
  Open directly in any browser, or via any static server.
-->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Uhrzeit Tests</title>
<style>
  :root { color-scheme: light dark; }
  html, body { margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, system-ui, sans-serif; background: #fafafa; color: #222; }
  body { padding: 24px; max-width: 920px; margin: 0 auto; }
  h1 { margin: 0 0 6px; font-size: 22px; }
  .summary { font-weight: 600; margin: 8px 0 20px; }
  .summary.ok { color: #1b7f1b; }
  .summary.fail { color: #b30000; }
  .group { margin-bottom: 20px; }
  .group-title { font-weight: 600; margin: 12px 0 4px; font-size: 13px; color: #555; text-transform: uppercase; letter-spacing: 0.08em; }
  ul { list-style: none; padding: 0; margin: 0; }
  li { padding: 4px 8px; font-family: ui-monospace, Menlo, monospace; font-size: 12.5px; line-height: 1.5; border-radius: 4px; }
  li.pass { color: #1b7f1b; }
  li.fail { color: #b30000; background: #fff4f4; white-space: pre-wrap; }
  button { font: inherit; padding: 8px 14px; border-radius: 6px; border: 1px solid #888; background: #fff; cursor: pointer; }
  @media (prefers-color-scheme: dark) {
    html, body { background: #1a1a1a; color: #ddd; }
    li.fail { background: #3a1a1a; color: #ff9999; }
    button { background: #2a2a2a; color: #ddd; border-color: #555; }
  }
</style>
</head>
<body>
<h1>Uhrzeit Lernen — tests</h1>
<div id="summary" class="summary">running…</div>
<button onclick="location.reload()">Re-run</button>
<div id="results"></div>

<script src="engine.js"></script>
<script>
// ─────────────────────────────────────────────────────────────
// tiny test framework
// ─────────────────────────────────────────────────────────────
const groups = [];
let currentGroup = null;
function group(name, fn) { currentGroup = { name, tests: [] }; groups.push(currentGroup); fn(); currentGroup = null; }
function test(name, fn) { currentGroup.tests.push({ name, fn }); }
function eq(a, b, msg = '') {
  const A = JSON.stringify(a), B = JSON.stringify(b);
  if (A !== B) throw new Error(`${msg ? msg + ' — ' : ''}expected ${B}, got ${A}`);
}
function ok(v, msg = '') { if (!v) throw new Error(msg || `expected truthy, got ${JSON.stringify(v)}`); }
function contains(arr, v, msg = '') { ok(arr.includes(v), `${msg} — expected array to contain ${JSON.stringify(v)}, got ${JSON.stringify(arr)}`); }
function run() {
  let pass = 0, fail = 0;
  const res = document.getElementById('results');
  for (const g of groups) {
    const wrap = document.createElement('div'); wrap.className = 'group';
    const h = document.createElement('div'); h.className = 'group-title'; h.textContent = g.name;
    const ul = document.createElement('ul');
    wrap.appendChild(h); wrap.appendChild(ul);
    for (const t of g.tests) {
      const li = document.createElement('li');
      try { t.fn(); pass++; li.className = 'pass'; li.textContent = '✓ ' + t.name; }
      catch (e) { fail++; li.className = 'fail'; li.textContent = '✗ ' + t.name + '\n    ' + e.message; }
      ul.appendChild(li);
    }
    res.appendChild(wrap);
  }
  const sum = document.getElementById('summary');
  sum.textContent = `${pass + fail} tests · ${pass} passed · ${fail} failed`;
  sum.className = 'summary ' + (fail === 0 ? 'ok' : 'fail');
  return { pass, fail };
}

// ─────────────────────────────────────────────────────────────
// ENGINE — parseTime / hourName / digitalFromQ / wordFromQ
// ─────────────────────────────────────────────────────────────
group('hourName & parseTime', () => {
  test('hourName cycles 12-based', () => {
    eq(hourName(1), 'eins'); eq(hourName(12), 'zwölf'); eq(hourName(13), 'eins');
  });
  test('parseTime(3, 0) → "drei Uhr"', () => {
    const p = parseTime(3, 0);
    eq(p.fullWord, 'drei Uhr'); eq(p.minute, null); eq(p.next, 4);
  });
  test('parseTime(3, 30) → "halb vier" (advances hour)', () => {
    const p = parseTime(3, 30);
    eq(p.fullWord, 'halb vier'); eq(p.minute, 'halb'); eq(p.hour, 4);
  });
  test('parseTime(12, 30) → "halb eins" (12→1 wrap)', () => {
    eq(parseTime(12, 30).fullWord, 'halb eins');
  });
  test('parseTime(1, 15) → "Viertel nach eins"', () => {
    eq(parseTime(1, 15).fullWord, 'Viertel nach eins');
  });
  test('parseTime(1, 45) → "Viertel vor zwei"', () => {
    eq(parseTime(1, 45).fullWord, 'Viertel vor zwei');
  });
  test('parseTime(5, 25) → "fünf vor halb sechs"', () => {
    eq(parseTime(5, 25).fullWord, 'fünf vor halb sechs');
  });
  test('parseTime(5, 35) → "fünf nach halb sechs"', () => {
    eq(parseTime(5, 35).fullWord, 'fünf nach halb sechs');
  });
  test('all minute-set entries produce a defined fullWord', () => {
    for (const m of MINUTE_SETS.fuenf) {
      for (let h = 1; h <= 12; h++) {
        const p = parseTime(h, m);
        ok(p && typeof p.fullWord === 'string' && p.fullWord.length > 0, `h=${h} m=${m}`);
      }
    }
  });
  test('parseTime falls back to digital form for 1-min precision', () => {
    // 3:12 has no standard nach/vor wording — fullWord should read as digital.
    const p = parseTime(3, 12);
    eq(p.fullWord, '3:12');
    eq(p.full, '3:12');
    eq(p.hour, 3);
  });
  test('parseTime returns a defined object for every minute 0..59', () => {
    for (let m = 0; m < 60; m++) {
      for (let h = 1; h <= 12; h++) {
        const p = parseTime(h, m);
        ok(p && typeof p.fullWord === 'string' && p.fullWord.length > 0, `h=${h} m=${m}`);
      }
    }
  });
});

group('MINUTE_SETS', () => {
  // Each set now holds only the NEW minutes introduced at that level; earlier
  // ones are covered via the review levels (which union several sets).
  test('volle: just :00', () => eq(MINUTE_SETS.volle, [0]));
  test('halbe: just :30 (delta)', () => eq(MINUTE_SETS.halbe, [30]));
  test('viertel: just :15 and :45 (delta)', () => eq(MINUTE_SETS.viertel, [15, 45]));
  test('fuenf: the eight non-quarter 5-min marks (delta)', () => {
    eq(MINUTE_SETS.fuenf, [5, 10, 20, 25, 35, 40, 50, 55]);
  });
  test('minute: every minute that is not already a 5-min mark (delta)', () => {
    eq(MINUTE_SETS.minute.length, 48);
    ok(!MINUTE_SETS.minute.includes(0),  'excludes 0');
    ok(!MINUTE_SETS.minute.includes(5),  'excludes 5');
    ok(!MINUTE_SETS.minute.includes(30), 'excludes 30');
    ok(MINUTE_SETS.minute.includes(1),   'includes 1');
    ok(MINUTE_SETS.minute.includes(13),  'includes 13');
    ok(MINUTE_SETS.minute.includes(59),  'includes 59');
    // Delta-only: no entry is a multiple of 5.
    for (const m of MINUTE_SETS.minute) ok(m % 5 !== 0, `m=${m} is a 5-mult`);
  });
});

group('effectiveMinutes', () => {
  // Single-set level: effectiveMinutes returns that set.
  test('single minuteSet → that set', () => {
    eq(effectiveMinutes({ minuteSet: 'halbe' }), [30]);
    eq(effectiveMinutes({ minuteSet: 'viertel' }), [15, 45]);
  });
  test('minuteSets array → union, sorted ascending', () => {
    eq(effectiveMinutes({ minuteSets: ['volle', 'halbe'] }), [0, 30]);
    eq(effectiveMinutes({ minuteSets: ['volle', 'halbe', 'viertel'] }),
       [0, 15, 30, 45]);
    eq(effectiveMinutes({ minuteSets: ['volle', 'halbe', 'viertel', 'fuenf'] }),
       [0, 5, 10, 15, 20, 25, 30, 35, 40, 45, 50, 55]);
  });
  test('duplicates within a union are collapsed', () => {
    eq(effectiveMinutes({ minuteSets: ['halbe', 'halbe'] }), [30]);
  });
});

group('digitalFromQ / wordFromQ', () => {
  test('digitalFromQ uses dh if present (24h)', () => {
    eq(digitalFromQ({ h: 2, m: 30, dh: 14, parsed: parseTime(2, 30) }), '14:30');
  });
  test('digitalFromQ falls back to h (12h)', () => {
    eq(digitalFromQ({ h: 2, m: 5, parsed: parseTime(2, 5) }), '2:05');
  });
  test('wordFromQ returns parsed.fullWord', () => {
    eq(wordFromQ({ parsed: parseTime(3, 30) }), 'halb vier');
  });
});

// ─────────────────────────────────────────────────────────────
// SNAP
// ─────────────────────────────────────────────────────────────
group('snap5deg / snapHour', () => {
  test('snap5deg snaps 0° → 0 min', () => eq(snap5deg(0), 0));
  test('snap5deg snaps 92° → 15 min (5-min grid)', () => eq(snap5deg(92), 15));
  test('snap5deg wraps 360° → 0', () => eq(snap5deg(360), 0));
  test('snap5deg handles negative', () => eq(snap5deg(-6), 59));
  test('snapHour snaps 0° → 12', () => eq(snapHour(0), 12));
  test('snapHour snaps 90° → 3', () => eq(snapHour(90), 3));
  test('snapHour snaps 359° → 12', () => eq(snapHour(359), 12));
});

group('minuteSnapGrid', () => {
  test('volle / halbe / viertel all share the 12/3/6/9 grid', () => {
    for (const ms of ['volle', 'halbe', 'viertel']) {
      eq(minuteSnapGrid({ minuteSet: ms }), QUARTER_GRID, `minuteSet=${ms}`);
    }
  });
  test('fuenf uses the 5-minute grid', () => {
    eq(minuteSnapGrid({ minuteSet: 'fuenf' }), FUENF_GRID);
  });
  test('minute returns null — falls through to 6° (1-minute) rounding', () => {
    eq(minuteSnapGrid({ minuteSet: 'minute' }), null);
  });
  test('unknown minuteSet returns null (no snap)', () => {
    eq(minuteSnapGrid({ minuteSet: 'totally-unknown' }), null);
  });
  // Review levels expose a minuteSets array. Grid should be the finest one
  // the review covers so the hand can land anywhere that's asked.
  test('review with only coarse sets uses the quarter grid', () => {
    eq(minuteSnapGrid({ minuteSets: ['volle', 'halbe', 'viertel'] }), QUARTER_GRID);
  });
  test('review that includes fuenf uses the 5-minute grid', () => {
    eq(minuteSnapGrid({ minuteSets: ['volle', 'halbe', 'viertel', 'fuenf'] }), FUENF_GRID);
  });
  test('review that includes minute returns null (free 1-min)', () => {
    eq(minuteSnapGrid({ minuteSets: ['fuenf', 'minute'] }), null);
  });
});

group('snapToAllowedMinutes', () => {
  test('volle: any angle → 0', () => {
    for (const ang of [0, 90, 180, 270, 354]) eq(snapToAllowedMinutes(ang, [0]), 0, `ang=${ang}`);
  });
  test('halbe: snaps to 0 near 12, to 30 near 6', () => {
    eq(snapToAllowedMinutes(10, [0, 30]), 0);
    eq(snapToAllowedMinutes(100, [0, 30]), 30);
    eq(snapToAllowedMinutes(180, [0, 30]), 30);
    eq(snapToAllowedMinutes(260, [0, 30]), 30);
    eq(snapToAllowedMinutes(355, [0, 30]), 0);
  });
  test('viertel: snaps to nearest of {0, 15, 30, 45}', () => {
    eq(snapToAllowedMinutes(30, [0, 15, 30, 45]), 0);   // 5 min — closer to 0
    eq(snapToAllowedMinutes(60, [0, 15, 30, 45]), 15);  // 10 min — closer to 15
    eq(snapToAllowedMinutes(135, [0, 15, 30, 45]), 30); // 22.5 → 30
    eq(snapToAllowedMinutes(260, [0, 15, 30, 45]), 45); // 43.3 → 45
  });
  test('near-zero backwards angle snaps to 0 (circular distance)', () => {
    eq(snapToAllowedMinutes(-6, [0, 30]), 0);           // 1 min backwards
    eq(snapToAllowedMinutes(354, [0, 15, 30, 45]), 0);  // visually just before 12
  });
  test('fuenf: snaps to nearest 5-min mark', () => {
    eq(snapToAllowedMinutes(42, [0,5,10,15,20,25,30,35,40,45,50,55]), 5);  // 7 min → 5
    eq(snapToAllowedMinutes(48, [0,5,10,15,20,25,30,35,40,45,50,55]), 10); // 8 min → 10
  });
});

// ─────────────────────────────────────────────────────────────
// MASTERY
// ─────────────────────────────────────────────────────────────
group('masteryTier', () => {
  test('≥10 → tier 3', () => eq(masteryTier(10), 3));
  test('9 → tier 2',     () => eq(masteryTier(9), 2));
  test('8 → tier 1',     () => eq(masteryTier(8), 1));
  test('0..7 → tier 0',  () => { for (let i = 0; i <= 7; i++) eq(masteryTier(i), 0, `c=${i}`); });
});

group('recordMastery', () => {
  test('adds fresh entry', () => {
    const next = recordMastery({}, 3, 8);
    eq(next[3], { tier: 1, best: 8, last: 8 });
  });
  test('best and tier only go up', () => {
    let m = recordMastery({}, 3, 10);             // tier 3, best 10
    m = recordMastery(m, 3, 5);                    // worse run should not lower tier/best
    eq(m[3].tier, 3); eq(m[3].best, 10); eq(m[3].last, 5);
  });
});

// ─────────────────────────────────────────────────────────────
// EXERCISE TYPE: LESEN (clock → digital)
// ─────────────────────────────────────────────────────────────
group('exercise: lesen', () => {
  for (const minuteSet of ['volle', 'halbe', 'viertel', 'fuenf', 'minute']) {
    test(`options for "${minuteSet}" include correct and are 4 unique`, () => {
      const level = { mode: 'lesen', minuteSet, hour24: false };
      // "minute" has 48 values * 12 hours = 576 cases; trim for test-page speed.
      const mins = minuteSet === 'minute'
        ? MINUTE_SETS.minute.filter((_, i) => i % 3 === 0)
        : MINUTE_SETS[minuteSet];
      for (const m of mins) {
        for (let h = 1; h <= 12; h++) {
          const q = { h, m, dh: h, parsed: parseTime(h, m) };
          const { options } = buildDigitalOptions(q, level);
          eq(options.length, 4, `h=${h} m=${m}`);
          eq(new Set(options).size, 4, `unique h=${h} m=${m}`);
          contains(options, digitalFromQ(q), `correct included h=${h} m=${m}`);
        }
      }
    });
  }
  // Review levels expose minuteSets as a union and buildDigitalOptions reads
  // effectiveMinutes — options should work for every minute in that union.
  test('review level (bis Viertel) options stay valid across the union', () => {
    const level = { mode: 'lesen', minuteSets: ['volle','halbe','viertel'], hour24: false };
    for (const m of [0, 15, 30, 45]) {
      for (let h = 1; h <= 12; h++) {
        const q = { h, m, dh: h, parsed: parseTime(h, m) };
        const { options } = buildDigitalOptions(q, level);
        eq(options.length, 4, `h=${h} m=${m}`);
        eq(new Set(options).size, 4, `unique h=${h} m=${m}`);
        contains(options, digitalFromQ(q), `correct h=${h} m=${m}`);
      }
    }
  });
  test('24h options stay in the same half-day as the answer (no 6:40 vs 18:40 trap)', () => {
    // On a clock face you can't tell AM from PM — so 24h options must
    // never include the 12-hour twin of the correct answer.
    const level = { mode: 'lesen', minuteSet: 'fuenf', hour24: true };
    const cases = [
      { h: 6, m: 40, dh: 18, twin: '6:40'  },  // PM answer — AM twin forbidden
      { h: 2, m: 30, dh: 14, twin: '2:30'  },
      { h: 6, m: 40, dh: 6,  twin: '18:40' },  // AM answer — PM twin forbidden
      { h: 12, m: 0, dh: 12, twin: '0:00'  },  // noon — midnight forbidden
      { h: 12, m: 0, dh: 0,  twin: '12:00' },  // midnight — noon forbidden
    ];
    for (const { h, m, dh, twin } of cases) {
      const q = { h, m, dh, parsed: parseTime(h, m) };
      const { options } = buildDigitalOptions(q, level);
      contains(options, digitalFromQ(q), `answer present dh=${dh}`);
      ok(!options.includes(twin), `twin "${twin}" forbidden for dh=${dh} — got ${JSON.stringify(options)}`);
      // Every option must sit in the same half-day as the answer.
      const pmHalf = dh >= 12;
      for (const o of options) {
        const oh = parseInt(o.split(':')[0], 10);
        const oPm = oh >= 12;
        eq(oPm, pmHalf, `option "${o}" wrong half-day for dh=${dh}`);
      }
    }
  });
  test('24h sweep — answer always present, all options same half-day, no 12h twin', () => {
    const level = { mode: 'lesen', minuteSet: 'fuenf', hour24: true };
    // Try every (dh in 0..23, m in fuenf). The half-day invariant must hold
    // for all of them; twin check is conditional (twin differs from answer
    // except at noon/midnight edges, already covered above).
    for (let dh = 0; dh < 24; dh++) {
      for (const m of MINUTE_SETS.fuenf) {
        const h = dh === 0 ? 12 : dh > 12 ? dh - 12 : dh;
        const q = { h, m, dh, parsed: parseTime(h, m) };
        const { options } = buildDigitalOptions(q, level);
        eq(options.length, 4, `dh=${dh} m=${m}`);
        eq(new Set(options).size, 4, `unique dh=${dh} m=${m}`);
        contains(options, digitalFromQ(q), `answer dh=${dh} m=${m}`);
        const pmHalf = dh >= 12;
        for (const o of options) {
          const oh = parseInt(o.split(':')[0], 10);
          ok((oh >= 12) === pmHalf, `half-day dh=${dh} m=${m} option=${o}`);
        }
      }
    }
  });
});

// ─────────────────────────────────────────────────────────────
// EXERCISE TYPE: WORT-LESEN (clock → phrase)
// ─────────────────────────────────────────────────────────────
group('exercise: wort-lesen', () => {
  for (const minuteSet of ['halbe', 'viertel', 'fuenf']) {
    test(`options for "${minuteSet}" include correct and are 4 unique`, () => {
      const level = { mode: 'wort-lesen', minuteSet, hour24: false };
      for (const m of MINUTE_SETS[minuteSet]) {
        for (let h = 1; h <= 12; h++) {
          const q = { h, m, dh: h, parsed: parseTime(h, m) };
          const { options } = buildWordOptions(q, level);
          eq(options.length, 4, `h=${h} m=${m}`);
          eq(new Set(options).size, 4, `unique h=${h} m=${m}`);
          contains(options, wordFromQ(q), `correct included h=${h} m=${m}`);
        }
      }
    });
  }
  test('review level (bis Fuenf) phrase options work across the union', () => {
    const level = { mode: 'wort-lesen', minuteSets: ['volle','halbe','viertel','fuenf'], hour24: false };
    const fullFuenf = [0, 5, 10, 15, 20, 25, 30, 35, 40, 45, 50, 55];
    for (const m of fullFuenf) {
      for (let h = 1; h <= 12; h++) {
        const q = { h, m, dh: h, parsed: parseTime(h, m) };
        const { options } = buildWordOptions(q, level);
        eq(options.length, 4, `h=${h} m=${m}`);
        eq(new Set(options).size, 4, `unique h=${h} m=${m}`);
        contains(options, wordFromQ(q), `correct h=${h} m=${m}`);
      }
    }
  });
  test('halb distractor includes both "halb h" and "halb h+2" confusions', () => {
    // 3:30 correct = "halb vier"; expected distractors "halb drei" (current-hour) and "halb fünf" (over-shoot)
    const q = { h: 3, m: 30, dh: 3, parsed: parseTime(3, 30) };
    const { options } = buildWordOptions(q, { mode: 'wort-lesen', minuteSet: 'halbe', hour24: false });
    contains(options, 'halb vier');
    contains(options, 'halb drei');
    contains(options, 'halb fünf');
  });
  test('Viertel nach has a "Viertel vor" distractor one hour ahead', () => {
    // 3:15 correct = "Viertel nach drei"; engine adds parseTime(next, 45) as
    // a nach↔vor confuser, which for h=3 is "Viertel vor fünf".
    const q = { h: 3, m: 15, dh: 3, parsed: parseTime(3, 15) };
    const { options } = buildWordOptions(q, { mode: 'wort-lesen', minuteSet: 'viertel', hour24: false });
    contains(options, 'Viertel nach drei');
    contains(options, 'Viertel vor fünf');
  });
  test('Viertel vor has a "Viertel nach" distractor one hour back', () => {
    // 3:45 correct = "Viertel vor vier"; engine adds parseTime(h-1, 15) = "Viertel nach zwei".
    const q = { h: 3, m: 45, dh: 3, parsed: parseTime(3, 45) };
    const { options } = buildWordOptions(q, { mode: 'wort-lesen', minuteSet: 'viertel', hour24: false });
    contains(options, 'Viertel vor vier');
    contains(options, 'Viertel nach zwei');
  });
});

// ─────────────────────────────────────────────────────────────
// EXERCISE TYPE: STELLEN / WORT-STELLEN (digital/phrase → clock)
// These modes don't use option builders; checking is a direct
// (setH === q.h) && (setM === q.m) comparison after snapping.
// We test the snap round-trip for every (h, m).
// ─────────────────────────────────────────────────────────────
group('exercise: stellen / wort-stellen snap round-trip', () => {
  test('snapHour(h * 30°) returns h (1..12)', () => {
    for (let h = 1; h <= 12; h++) eq(snapHour(h * 30), h === 12 ? 12 : h);
  });
  test('snap5deg(m * 6°) returns m for m ∈ {0,5,…,55}', () => {
    for (const m of MINUTE_SETS.fuenf) eq(snap5deg(m * 6), m, `m=${m}`);
  });
  test('small drift snaps to the nearest 5-minute mark', () => {
    // +2° off the mark (well within the 3° half-window for a 5-min step)
    eq(snap5deg(15 * 6 + 2), 15);
    eq(snap5deg(30 * 6 - 2), 30);
  });
});

// ─────────────────────────────────────────────────────────────
// TRANSITIONS BETWEEN EXERCISE TYPES
// ─────────────────────────────────────────────────────────────
group('transitions between exercises', () => {
  test('LEVELS covers all four modes across learning and review levels', () => {
    const modes = new Set();
    for (const l of LEVELS) {
      if (l.mode) modes.add(l.mode);
      if (l.modes) for (const m of l.modes) modes.add(m);
    }
    eq(modes.has('lesen'), true);
    eq(modes.has('stellen'), true);
    eq(modes.has('wort-lesen'), true);
    eq(modes.has('wort-stellen'), true);
  });
  test('LEVELS ids are sequential and unique', () => {
    LEVELS.forEach((l, i) => eq(l.id, i, `id at ${i}`));
  });
  test('makeQuestion matches the level-effective minuteSet', () => {
    for (const level of LEVELS) {
      const q = makeQuestion(level);
      ok(q.h >= 1 && q.h <= 12, `h in range (${level.title})`);
      const mins = effectiveMinutes(level);
      ok(mins.includes(q.m), `m=${q.m} in effectiveMinutes (${level.title})`);
      eq(q.parsed.fullWord, parseTime(q.h, q.m).fullWord, `parsed consistent (${level.title})`);
      if (level.hour24) ok(q.dh >= 12 && q.dh <= 23, `24h dh PM-only (${level.title})`);
    }
  });
  test('24h levels are PM-only — dh lands in 12..23 over many draws', () => {
    const level = LEVELS.find(l => l.hour24);
    ok(level, '24h level exists');
    for (let i = 0; i < 60; i++) {
      const q = makeQuestion(level);
      ok(q.dh >= 12 && q.dh <= 23, `draw ${i} dh=${q.dh}`);
    }
  });
  test('early levels sit at known positions', () => {
    // First block (volle + halbe) is unchanged by the review insertions.
    eq(LEVELS[0].mode, 'lesen');
    eq(LEVELS[1].mode, 'stellen');
    eq(LEVELS[3].mode, 'wort-lesen');
    eq(LEVELS[4].mode, 'wort-stellen');
  });
  test('minute-precision levels remain the very last two (lesen then stellen)', () => {
    const n = LEVELS.length;
    const lesen   = LEVELS[n - 2];
    const stellen = LEVELS[n - 1];
    eq(lesen.minuteSet, 'minute');   eq(lesen.mode,   'lesen');
    eq(stellen.minuteSet, 'minute'); eq(stellen.mode, 'stellen');
    ok(!LEVELS.some(l => l.minuteSet === 'minute' && l.mode && l.mode.startsWith('wort')),
      'no wort-* levels at minute precision');
  });
  test('makeQuestion on minute-precision level produces integer minute 0..59', () => {
    const level = LEVELS.find(l => l.minuteSet === 'minute');
    for (let i = 0; i < 40; i++) {
      const q = makeQuestion(level);
      ok(Number.isInteger(q.m) && q.m >= 0 && q.m < 60, `m in range — got ${q.m}`);
      ok(q.h >= 1 && q.h <= 12, `h in range — got ${q.h}`);
    }
  });
});

group('review levels', () => {
  test('there are exactly two — after viertel and after fuenf', () => {
    const reviews = LEVELS.filter(l => l.review);
    eq(reviews.length, 2, `got ${reviews.length} review levels`);
  });
  test('first review sits immediately after the viertel block', () => {
    // The viertel block ends with viertel/stellen; the review sits right after.
    const i = LEVELS.findIndex(l => l.review);
    ok(i > 0, 'review exists');
    eq(LEVELS[i - 1].minuteSet, 'viertel');
    eq(LEVELS[i - 1].mode,      'stellen');
    eq(LEVELS[i].minuteSets.join(','), 'volle,halbe,viertel');
  });
  test('second review sits immediately after the fuenf block', () => {
    const iAll = LEVELS.map((l, i) => l.review ? i : -1).filter(i => i >= 0);
    const i = iAll[1];
    eq(LEVELS[i - 1].minuteSet, 'fuenf');
    eq(LEVELS[i - 1].mode,      'stellen');
    eq(LEVELS[i].minuteSets.join(','), 'volle,halbe,viertel,fuenf');
  });
  test('review levels declare all four modes, no single scalar mode', () => {
    for (const r of LEVELS.filter(l => l.review)) {
      ok(!r.mode, `review level ${r.id} must not set .mode`);
      eq(new Set(r.modes).size, 4);
      for (const m of ['lesen', 'stellen', 'wort-lesen', 'wort-stellen']) {
        ok(r.modes.includes(m), `review ${r.id} missing ${m}`);
      }
    }
  });
  test('makeQuestion on a review level picks a mode from the level list', () => {
    const review = LEVELS.find(l => l.review);
    const seen = new Set();
    for (let i = 0; i < 200; i++) {
      const q = makeQuestion(review);
      ok(review.modes.includes(q.mode), `q.mode=${q.mode} not in level.modes`);
      seen.add(q.mode);
    }
    // With 200 draws over 4 modes, coverage should be complete.
    eq(seen.size, 4, `only saw modes: ${[...seen].join(',')}`);
  });
  test('makeQuestion on a review level distributes minutes across the union', () => {
    const review = LEVELS.find(l => l.review && l.minuteSets.includes('fuenf'));
    const mins = new Set();
    for (let i = 0; i < 400; i++) mins.add(makeQuestion(review).m);
    // Expect all 12 five-minute marks eventually.
    for (const m of [0, 5, 10, 15, 20, 25, 30, 35, 40, 45, 50, 55]) {
      ok(mins.has(m), `m=${m} never drawn in 400 trials`);
    }
  });
});

// ─────────────────────────────────────────────────────────────
// LOCAL STORAGE — persistence of level choice and mastery
// ─────────────────────────────────────────────────────────────
group('localStorage persistence', () => {
  test('saveMastery / loadMastery round-trip', () => {
    resetMastery();
    eq(loadMastery(), {});
    const m = recordMastery({}, 5, 10);
    saveMastery(m);
    eq(loadMastery(), m);
  });
  test('resetMastery clears both MASTERY_KEY and LEVEL_KEY', () => {
    localStorage.setItem(MASTERY_KEY, JSON.stringify({ 0: { tier: 1, best: 8, last: 8 } }));
    localStorage.setItem(LEVEL_KEY, '7');
    resetMastery();
    eq(localStorage.getItem(MASTERY_KEY), null);
    eq(localStorage.getItem(LEVEL_KEY), null);
  });
  test('level choice persists through load cycle', () => {
    resetMastery();
    localStorage.setItem(LEVEL_KEY, '4');
    eq(parseInt(localStorage.getItem(LEVEL_KEY) || '0', 10), 4);
    resetMastery();
    eq(parseInt(localStorage.getItem(LEVEL_KEY) || '0', 10), 0);
  });
  test('mastery keyed by levelId is independent per level', () => {
    let m = {};
    m = recordMastery(m, 0, 10);
    m = recordMastery(m, 5, 8);
    eq(m[0].tier, 3);
    eq(m[5].tier, 1);
    ok(m[1] === undefined, 'level 1 untouched');
  });
});

// ─────────────────────────────────────────────────────────────
// MASTERY MIGRATION — v1 (pre-review-levels) → v2
// v1 had 18 levels (0..17). v2 inserts review levels at 10 and 15,
// shifting all levels that sat past those insertion points.
//   old [0..9]   → unchanged
//   old [10..13] → +1  (fuenf block; now at 11..14)
//   old [14..15] → +2  (24h; now at 16..17)
//   old [16..17] → +2  (minute; now at 18..19)
// ─────────────────────────────────────────────────────────────
group('mastery migration v1 → v2', () => {
  const V1_KEY = 'uhrzeit.mastery.v1';
  test('MASTERY_KEY is v2', () => eq(MASTERY_KEY, 'uhrzeit.mastery.v2'));
  test('loadMastery migrates v1 ids into their v2 positions', () => {
    localStorage.removeItem(MASTERY_KEY);
    localStorage.setItem(V1_KEY, JSON.stringify({
      0:  { tier: 3, best: 10, last: 10 }, // unchanged
      9:  { tier: 2, best: 9,  last: 9  }, // unchanged (viertel/stellen)
      10: { tier: 1, best: 8,  last: 8  }, // was fuenf/lesen → 11
      13: { tier: 3, best: 10, last: 10 }, // was fuenf/stellen → 14
      14: { tier: 2, best: 9,  last: 9  }, // was 24h/lesen → 16
      17: { tier: 1, best: 8,  last: 8  }, // was minute/stellen → 19
    }));
    const loaded = loadMastery();
    eq(loaded[0].tier, 3,  'old 0 stayed');
    eq(loaded[9].tier, 2,  'old 9 stayed');
    eq(loaded[11].tier, 1, 'old 10 → 11');
    eq(loaded[14].tier, 3, 'old 13 → 14');
    eq(loaded[16].tier, 2, 'old 14 → 16');
    eq(loaded[19].tier, 1, 'old 17 → 19');
  });
  test('after migration v1 is cleared and v2 holds the migrated data', () => {
    localStorage.removeItem(MASTERY_KEY);
    localStorage.setItem(V1_KEY, JSON.stringify({ 17: { tier: 3, best: 10, last: 10 } }));
    loadMastery();
    eq(localStorage.getItem(V1_KEY), null, 'v1 cleared');
    const v2 = JSON.parse(localStorage.getItem(MASTERY_KEY));
    eq(v2[19].tier, 3, 'v2 holds the shifted value');
  });
  test('v2 data wins over lingering v1 data', () => {
    localStorage.setItem(MASTERY_KEY, JSON.stringify({ 5: { tier: 2, best: 9, last: 9 } }));
    localStorage.setItem(V1_KEY, JSON.stringify({ 17: { tier: 3, best: 10, last: 10 } }));
    const loaded = loadMastery();
    eq(loaded[5].tier, 2);
    ok(loaded[19] === undefined, 'v1 not re-migrated when v2 exists');
    // v1 should have been left alone in this case (v2 already ran the migration
    // historically — don't clobber it).
    ok(localStorage.getItem(V1_KEY) !== null, 'v1 preserved when v2 already present');
    localStorage.removeItem(V1_KEY);
  });
});

// clean up after tests (do not leave test state in storage)
window.addEventListener('load', () => {
  const { pass, fail } = run();
  try { resetMastery(); } catch {}
  document.title = `${pass} ✓ / ${fail} ✗ — Uhrzeit Tests`;
});
</script>
